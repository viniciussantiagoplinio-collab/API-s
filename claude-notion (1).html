<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude no Notion</title>
  <style>
    :root {
      --bg:       #ffffff;
      --bg2:      #f7f7f5;
      --bg3:      #f0f0ec;
      --border:   #e5e5e0;
      --text:     #1a1a18;
      --text2:    #6b6b68;
      --text3:    #aaaaA5;
      --accent:   #7c6ff7;
      --accent-bg:#f0effe;
      --user-bg:  #f0effe;
      --user-txt: #3b3490;
      --bot-bg:   #f7f7f5;
      --bot-txt:  #1a1a18;
      --send-bg:  #7c6ff7;
    }
    .dark {
      --bg:       #191919;
      --bg2:      #222222;
      --bg3:      #2a2a2a;
      --border:   #333333;
      --text:     #e8e8e4;
      --text2:    #9a9a95;
      --text3:    #555550;
      --accent:   #9d98f5;
      --accent-bg:#2a2650;
      --user-bg:  #2a2650;
      --user-txt: #c4c0f8;
      --bot-bg:   #252525;
      --bot-txt:  #e8e8e4;
      --send-bg:  #7c6ff7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Setup */
    #setup {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; gap: 12px;
    }
    .setup-logo {
      width: 46px; height: 46px;
      background: var(--accent-bg); border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    #setup h1 { font-size: 18px; font-weight: 600; }
    #setup p  { font-size: 13px; color: var(--text2); text-align: center; max-width: 300px; line-height: 1.5; }
    .setup-field { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 5px; }
    .setup-field label { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; }
    .setup-field input,
    .setup-field select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg2); color: var(--text);
      font-size: 13px; outline: none; font-family: inherit;
    }
    .setup-field input:focus,
    .setup-field select:focus { border-color: var(--accent); }
    .model-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
    #start-btn {
      width: 100%; max-width: 340px;
      padding: 10px; background: var(--send-bg);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 4px;
    }
    #start-btn:hover { opacity: 0.9; }
    .hint { font-size: 11px; color: var(--text3); text-align: center; max-width: 300px; line-height: 1.6; }
    .hint a { color: var(--accent); text-decoration: none; }

    /* Chat */
    #chat { flex: 1; display: none; flex-direction: column; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .topbar-name { font-size: 13px; font-weight: 600; }
    .topbar-actions { display: flex; gap: 4px; }
    .topbar-actions button {
      font-size: 11px; color: var(--text3);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
    }
    .topbar-actions button:hover { background: var(--bg3); color: var(--text2); }

    .modelbar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .modelbar label { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .modelbar select {
      font-size: 12px; font-weight: 500;
      color: var(--text2); background: transparent;
      border: none; outline: none; cursor: pointer;
      font-family: inherit;
    }
    .modelbar select option { background: var(--bg2); color: var(--text); }
    .model-badge {
      margin-left: auto;
      font-size: 10px; padding: 2px 8px;
      border-radius: 20px; font-weight: 500;
    }
    .badge-haiku  { background: #e8f5ee; color: #2a7a4a; }
    .badge-sonnet { background: #e8f0fe; color: #1a56c4; }
    .badge-opus   { background: #f0effe; color: #5b4bd4; }

    .sysbar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .sysbar label { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .sysbar input {
      flex: 1; border: none; background: transparent;
      color: var(--text2); font-size: 12px; outline: none;
      font-family: inherit;
    }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg { display: flex; flex-direction: column; gap: 3px; }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }
    .bubble {
      max-width: 85%; padding: 9px 13px;
      border-radius: 14px; font-size: 14px;
      line-height: 1.55; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); color: var(--user-txt); border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); color: var(--bot-txt); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; }
    .bubble code { background: var(--bg3); border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
    .bubble pre { background: var(--bg3); border-radius: 8px; padding: 10px 12px; font-size: 12px; overflow-x: auto; margin: 6px 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }
    .msg-model { font-size: 10px; color: var(--text3); padding: 0 4px; }

    .typing {
      display: flex; align-items: center; gap: 4px;
      background: var(--bot-bg); border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
      padding: 10px 14px; width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .inputbar {
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--bg); display: flex; gap: 8px; align-items: flex-end;
    }
    .inputbar textarea {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg2); color: var(--text);
      font-size: 14px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; line-height: 1.45;
    }
    .inputbar textarea:focus { border-color: var(--accent); }
    .inputbar textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 36px; height: 36px; background: var(--send-bg);
      border: none; border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="setup">
  <div class="setup-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a9.96 9.96 0 0 1 6.29 2.23M21.8 9A10 10 0 1 1 12 2"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </div>
  <h1>Claude no Notion</h1>
  <p>Configure sua chave e escolha o modelo.</p>

  <div class="setup-field">
    <label>API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
  </div>

  <div class="setup-field">
    <label>Modelo</label>
    <select id="model-setup" onchange="updateModelDesc()">
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 — rápido e econômico</option>
      <option value="claude-sonnet-4-6" selected>Sonnet 4.6 — equilibrado ⭐</option>
      <option value="claude-opus-4-6">Opus 4.6 — máxima inteligência</option>
    </select>
    <div class="model-desc" id="model-desc">Ideal para a maioria das tarefas. Ótimo custo-benefício.</div>
  </div>

  <button id="start-btn" onclick="startChat()">Começar</button>

  <p class="hint">
    Chave salva só neste navegador.<br/>
    Obtenha em <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com/keys</a>
  </p>
</div>

<div id="chat">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <div class="topbar-name">Claude</div>
    </div>
    <div class="topbar-actions">
      <button onclick="openSettings()">Configurar</button>
      <button onclick="clearChat()">Limpar</button>
    </div>
  </div>

  <div class="modelbar">
    <label>Modelo:</label>
    <select id="model-chat" onchange="changeModel()">
      <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      <option value="claude-sonnet-4-6" selected>Sonnet 4.6</option>
      <option value="claude-opus-4-6">Opus 4.6</option>
    </select>
    <span class="model-badge badge-sonnet" id="model-badge">equilibrado</span>
  </div>

  <div class="sysbar">
    <label>Instruções:</label>
    <input type="text" id="system-input" placeholder="Ex: Seja um assistente de produtividade." value="Você é um assistente útil. Responda em português."/>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputbar">
    <textarea id="msg-input" rows="1" placeholder="Mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 13.5L13.5 8 3 2.5V6l7 2-7 2z" fill="#fff"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let apiKey = '';
  let history = [];

  const MODELS = {
    'claude-haiku-4-5-20251001': { label: 'Haiku 4.5',  badge: 'badge-haiku',  desc: 'Rápido e econômico. Ideal para tarefas simples.' },
    'claude-sonnet-4-6':         { label: 'Sonnet 4.6', badge: 'badge-sonnet', desc: 'Ideal para a maioria das tarefas. Ótimo custo-benefício.' },
    'claude-opus-4-6':           { label: 'Opus 4.6',   badge: 'badge-opus',   desc: 'Máxima inteligência. Para tarefas complexas.' },
  };

  function applyTheme() {
    const p = new URLSearchParams(location.search).get('theme');
    const dark = p === 'dark' || (!p && matchMedia('(prefers-color-scheme: dark)').matches);
    document.body.classList.toggle('dark', dark);
  }
  applyTheme();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

  window.onload = () => {
    const saved = localStorage.getItem('claude_api_key');
    const savedModel = localStorage.getItem('claude_model') || 'claude-sonnet-4-6';
    document.getElementById('model-setup').value = savedModel;
    document.getElementById('model-chat').value  = savedModel;
    updateModelDesc();
    updateModelBadge(savedModel);
    if (saved) { apiKey = saved; showChat(); }
  };

  function updateModelDesc() {
    const val = document.getElementById('model-setup').value;
    document.getElementById('model-desc').textContent = MODELS[val]?.desc || '';
  }

  function updateModelBadge(val) {
    const m = MODELS[val];
    if (!m) return;
    const badge = document.getElementById('model-badge');
    badge.className = 'model-badge ' + m.badge;
    badge.textContent = m.label.split(' ')[1] === '4.5' ? 'rápido' : val.includes('sonnet') ? 'equilibrado' : 'poderoso';
  }

  function changeModel() {
    const val = document.getElementById('model-chat').value;
    localStorage.setItem('claude_model', val);
    updateModelBadge(val);
  }

  function startChat() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-ant-')) { alert('API Key inválida. Deve começar com sk-ant-'); return; }
    apiKey = val;
    localStorage.setItem('claude_api_key', val);
    const m = document.getElementById('model-setup').value;
    localStorage.setItem('claude_model', m);
    document.getElementById('model-chat').value = m;
    updateModelBadge(m);
    showChat();
  }

  function showChat() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat').style.display  = 'flex';
    document.getElementById('msg-input').focus();
  }

  function openSettings() {
    document.getElementById('chat').style.display  = 'none';
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('api-key-input').value = '';
  }

  function clearChat() { history = []; document.getElementById('messages').innerHTML = ''; }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
  function handleKey(e)   { if (e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }

  function timeStr() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

  function appendMsg(role, text, modelLabel) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    div.appendChild(bubble);
    const meta = document.createElement('div');
    meta.style.display = 'flex'; meta.style.gap = '6px'; meta.style.alignItems = 'center';
    const time = document.createElement('span');
    time.className = 'msg-time'; time.textContent = timeStr();
    meta.appendChild(time);
    if (role === 'bot' && modelLabel) {
      const ml = document.createElement('span');
      ml.className = 'msg-model'; ml.textContent = modelLabel;
      meta.appendChild(ml);
    }
    div.appendChild(meta);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function formatText(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>[\s\S]*<\/li>)/,'<ul>$1</ul>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/^(?!<)(.+)/,'<p>$1</p>');
  }

  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className='msg bot'; div.id='typing-indicator';
    div.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    box.appendChild(div); box.scrollTop = box.scrollHeight;
  }
  function hideTyping() { const el=document.getElementById('typing-indicator'); if(el) el.remove(); }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;

    const btn   = document.getElementById('send-btn');
    const model = document.getElementById('model-chat').value;
    btn.disabled = true;
    input.value  = ''; input.style.height = 'auto';

    appendMsg('user', text);
    history.push({role:'user', content: text});
    showTyping();

    const system = document.getElementById('system-input').value.trim() || 'Você é um assistente útil. Responda em português.';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model, max_tokens: 1024, system, messages: history }),
      });
      const data = await res.json();
      hideTyping();
      if (data.error) {
        appendMsg('bot', `Erro: ${data.error.message}`);
        history.pop();
      } else {
        const reply = data.content[0].text;
        history.push({role:'assistant', content: reply});
        appendMsg('bot', reply, MODELS[model]?.label);
      }
    } catch(e) {
      hideTyping();
      appendMsg('bot', 'Erro de conexão. Verifique sua chave e tente novamente.');
      history.pop();
    }
    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
