<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conversor de Moedas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .converter {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      padding: 1.75rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 18px; font-weight: 600; color: #1a1a18; }
    .header p { font-size: 13px; color: #888; margin-top: 4px; }
    .card {
      background: #fafaf8;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 10px;
    }
    .field-label { font-size: 11px; color: #999; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
    .field-row { display: flex; gap: 8px; align-items: center; }
    .amount-input {
      flex: 1;
      font-size: 24px;
      font-weight: 600;
      color: #1a1a18;
      background: transparent;
      border: none;
      outline: none;
      min-width: 0;
    }
    .amount-input::placeholder { color: #ccc; }
    .currency-select {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a18;
      background: #fff;
      border: 1px solid #e0e0da;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
    }
    .swap-wrap { display: flex; justify-content: center; margin: 6px 0; }
    .swap-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #f0f0ea;
      border: 1px solid #e0e0da;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .swap-btn:hover { background: #e5e5de; }
    .result-amount { font-size: 28px; font-weight: 600; color: #1a1a18; }
    .result-name { font-size: 13px; color: #888; margin-top: 3px; }
    .rate-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
    }
    .live-badge {
      background: #e8f5ee;
      color: #2a7a4a;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .popular-section { margin-top: 1rem; }
    .popular-title { font-size: 11px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
    .popular-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .popular-card {
      background: #fafaf8;
      border: 1px solid #e5e5e0;
      border-radius: 10px;
      padding: 9px 11px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .popular-card:hover { border-color: #bbb; background: #f5f5f0; }
    .popular-pair { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .popular-rate { font-size: 13px; font-weight: 600; color: #1a1a18; }
    .status { font-size: 12px; color: #888; }
    .status.ok { color: #2a7a4a; }
    .status.err { color: #c0392b; }
    .updated { font-size: 11px; color: #bbb; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
<div class="converter">
  <div class="header">
    <h1>Conversor de moedas</h1>
    <p class="status" id="status">Buscando cotações...</p>
  </div>

  <div class="card">
    <div class="field-label">Valor</div>
    <div class="field-row">
      <input class="amount-input" type="number" id="amount" value="1" placeholder="0" />
      <select class="currency-select" id="from-currency"></select>
    </div>
  </div>

  <div class="swap-wrap">
    <button class="swap-btn" id="swap-btn" title="Inverter moedas">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#555" stroke-width="1.5">
        <path d="M3 5h10M10 2l3 3-3 3M13 11H3M6 8l-3 3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="card">
    <div class="field-label">Resultado</div>
    <div class="field-row">
      <div style="flex:1;min-width:0">
        <div class="result-amount" id="result">—</div>
        <div class="result-name" id="result-name"></div>
      </div>
      <select class="currency-select" id="to-currency"></select>
    </div>
    <div class="rate-row" id="rate-row" style="display:none">
      <span id="rate-text"></span>
      <span class="live-badge">ao vivo</span>
    </div>
  </div>

  <div class="popular-section">
    <div class="popular-title">Pares populares</div>
    <div class="popular-grid" id="popular-grid"></div>
  </div>

  <div class="updated" id="updated-at"></div>
</div>

<script>
const CURRENCIES = [
  {code:'BRL',name:'Real brasileiro'},
  {code:'USD',name:'Dólar americano'},
  {code:'EUR',name:'Euro'},
  {code:'GBP',name:'Libra esterlina'},
  {code:'ARS',name:'Peso argentino'},
  {code:'JPY',name:'Iene japonês'},
  {code:'CAD',name:'Dólar canadense'},
  {code:'CHF',name:'Franco suíço'},
  {code:'CNY',name:'Yuan chinês'},
  {code:'MXN',name:'Peso mexicano'},
  {code:'AUD',name:'Dólar australiano'},
  {code:'CLP',name:'Peso chileno'},
  {code:'COP',name:'Peso colombiano'},
  {code:'PEN',name:'Sol peruano'},
  {code:'UYU',name:'Peso uruguaio'},
];

const POPULAR = [
  {from:'USD',to:'BRL'},
  {from:'EUR',to:'BRL'},
  {from:'GBP',to:'BRL'},
  {from:'ARS',to:'BRL'},
  {from:'EUR',to:'USD'},
  {from:'JPY',to:'BRL'},
];

let rates = {};

const fromSel = document.getElementById('from-currency');
const toSel   = document.getElementById('to-currency');
const amtIn   = document.getElementById('amount');
const result  = document.getElementById('result');
const resName = document.getElementById('result-name');
const rateRow = document.getElementById('rate-row');
const rateText= document.getElementById('rate-text');
const statusEl= document.getElementById('status');
const grid    = document.getElementById('popular-grid');
const updated = document.getElementById('updated-at');

function populateSelects(f='USD', t='BRL') {
  [fromSel, toSel].forEach((sel, i) => {
    sel.innerHTML = '';
    CURRENCIES.forEach(c => {
      const o = document.createElement('option');
      o.value = c.code;
      o.textContent = c.code;
      if ((i===0&&c.code===f)||(i===1&&c.code===t)) o.selected=true;
      sel.appendChild(o);
    });
  });
}

function fmt(n, code) {
  const decimals = ['JPY','CLP','COP'].includes(code) ? 0 : 2;
  return n.toLocaleString('pt-BR', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function convert() {
  const amt  = parseFloat(amtIn.value)||0;
  const from = fromSel.value;
  const to   = toSel.value;
  if (!rates[from]||!rates[to]) return;
  const converted = (amt / rates[from]) * rates[to];
  const rate      = rates[to] / rates[from];
  result.textContent  = fmt(converted, to);
  resName.textContent = CURRENCIES.find(c=>c.code===to)?.name || to;
  rateText.textContent= `1 ${from} = ${rate.toLocaleString('pt-BR',{minimumFractionDigits:4,maximumFractionDigits:4})} ${to}`;
  rateRow.style.display='flex';
  buildPopular();
}

function buildPopular() {
  grid.innerHTML='';
  POPULAR.forEach(p => {
    if (!rates[p.from]||!rates[p.to]) return;
    const r = rates[p.to]/rates[p.from];
    const card = document.createElement('div');
    card.className='popular-card';
    card.innerHTML=`<div class="popular-pair">${p.from} → ${p.to}</div><div class="popular-rate">${fmt(r,p.to)}</div>`;
    card.onclick=()=>{ fromSel.value=p.from; toSel.value=p.to; convert(); };
    grid.appendChild(card);
  });
}

async function fetchRates() {
  try {
    const res  = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if (data.result!=='success') throw new Error();
    rates = {...data.rates, USD:1};
    const now = new Date();
    statusEl.textContent = 'Cotações em tempo real';
    statusEl.className   = 'status ok';
    updated.textContent  = `Atualizado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    convert();
  } catch(e) {
    statusEl.textContent = 'Erro ao carregar cotações';
    statusEl.className   = 'status err';
  }
}

populateSelects();
fromSel.addEventListener('change', convert);
toSel.addEventListener('change', convert);
amtIn.addEventListener('input', convert);
document.getElementById('swap-btn').addEventListener('click', ()=>{
  const tmp=fromSel.value; fromSel.value=toSel.value; toSel.value=tmp; convert();
});
fetchRates();
</script>
</body>
</html>
