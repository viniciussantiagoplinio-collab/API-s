<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Life</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #1a1d27;
      border-radius: 16px;
      padding: 32px;
      max-width: 680px;
      width: 100%;
      border: 1px solid #2a2d3a;
    }
    h2 {
      color: #e8e8e8;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 28px;
    }
    #chart_div {
      width: 100%;
      height: 380px;
    }
    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      color: #aaa;
      font-size: 13px;
      flex: 1;
    }
    .legend-value {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>⊛ Wheel of Life</h2>
    <p class="subtitle">Pontuação atual por área de vida</p>
    <div id="chart_div"></div>
    <div class="legend" id="legend"></div>
  </div>

  <script type="text/javascript">
    const data = [
      { label: 'Espiritualidade', value: 6,  color: '#7F77DD' },
      { label: 'Family & Friends', value: 5,  color: '#1D9E75' },
      { label: 'Health & Fitness', value: 7,  color: '#378ADD' },
      { label: 'Personal Growth',  value: 6,  color: '#639922' },
      { label: 'Romance',          value: 3,  color: '#E24B4A' },
      { label: 'Propósito',        value: 8,  color: '#EF9F27' },
      { label: 'Carreira',         value: 7,  color: '#D4537E' },
      { label: 'Finanças',         value: 6,  color: '#888780' },
    ];

    const total = data.reduce((s, d) => s + d.value, 0);

    const legend = document.getElementById('legend');
    data.forEach(d => {
      const pct = Math.round(d.value / total * 100);
      legend.innerHTML += `
        <div class="legend-item">
          <div class="legend-dot" style="background:${d.color}"></div>
          <span class="legend-label">${d.label}</span>
          <span class="legend-value">${d.value} <span style="color:#555;font-weight:400">(${pct}%)</span></span>
        </div>`;
    });

    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      const rows = [['Área', 'Pontuação']].concat(data.map(d => [d.label, d.value]));
      const chartData = google.visualization.arrayToDataTable(rows);

      const options = {
        backgroundColor: 'transparent',
        chartArea: { width: '90%', height: '90%' },
        pieHole: 0.5,
        colors: data.map(d => d.color),
        legend: 'none',
        pieSliceBorderColor: '#1a1d27',
        tooltip: {
          text: 'both',
          textStyle: { color: '#fff', fontSize: 13 },
          showColorCode: true,
        },
        pieSliceTextStyle: { color: 'transparent' },
      };

      const chart = new google.visualization.PieChart(document.getElementById('chart_div'));
      chart.draw(chartData, options);
    }
  </script>
</body>
</html>
